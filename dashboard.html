<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – Service Centre</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="navbar">
    <div class="logo">Service Centre</div>
    <nav>
      <a href="listings.html">View Listings</a>
      <a href="index.html">Logout</a>
    </nav>
  </header>

  <section class="mini-hero">
    <h2>Create New Listing</h2>
  </section>

  <section class="form-section">
    <form class="styled-form">

      <label class="form-label">Type</label>
      <select required>
        <option value="">Select Type</option>
        <option value="service">Service</option>
        <option value="item">Item</option>
      </select>

      <label class="form-label">Category</label>
      <input type="text" placeholder="Tutoring, Furniture, Electronics…" required>

      <label class="form-label">Description</label>
      <textarea placeholder="Describe your item or service..." required></textarea>

      <label class="form-label">Price (₹)</label>
      <input type="number" required>

      <label class="form-label">Location</label>
      <input type="text" required>

      <label class="form-label">Contact Info</label>
      <input type="text" placeholder="Phone or Email" required>

      <button class="primary-btn">Submit Listing</button>

    </form>
  </section>

</body>
</html>
