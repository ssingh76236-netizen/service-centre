<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listings – Service Centre</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="navbar">
    <div class="logo">Service Centre</div>
    <nav>
      <a href="dashboard.html">List Something</a>
      <a href="index.html">Logout</a>
    </nav>
  </header>

  <section class="mini-hero">
    <h2>Available Listings</h2>
  </section>

  <section class="preview">
    <div class="card-container">

      <div class="card">
        <img class="main-img" src="images/dining.jpg" alt="Dining Table">
        <h4>Dining Table</h4>
        <p>₹4000 • Pune</p>
        <button class="primary-btn small">Contact</button>
      </div>

      <div class="card">
        <img class="main-img" src="images/acrepair.jpg" alt="AC Repair">
        <h4>AC Repair</h4>
        <p>₹500 • Jaipur</p>
        <button class="primary-btn small">Contact</button>
      </div>
      
      <div class="card">
        <img class="main-img" src="images/tutor.jpg" alt="Tutor Service"> 
        <h4>Home Tutoring</h4>
        <p>₹500/hr • Lucknow</p>
        <button class="primary-btn small">Contact</button>
      </div>

      <div class="card">
        <img class="main-img" src="images/fridge.jpg" alt="Fridge">
        <h4>Fridge</h4>
        <p>₹7000 • Delhi</p>
        <button class="primary-btn small">Contact</button>
      </div>

      <div class="card">
        <img class="main-img" src="images/catering.jpg" alt="Service">
        <h4>Catering Service</h4>
        <p>₹1500/event • Mumbai</p>
        <button class="primary-btn small">Contact</button>
      </div>
    </div>
  </section>

</body>
</html>
